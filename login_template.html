<!DOCTYPE html><html><head><title>BingX Bot</title><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><style>*{margin:0;padding:0;box-sizing:border-box}body{background:#0d1117;color:#e6edf3;font-family:sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh}.box{background:#161b22;border:1px solid #30363d;border-radius:16px;padding:40px;width:100%;max-width:380px;text-align:center}.logo{font-size:52px;margin-bottom:12px}h1{color:#58a6ff;font-size:20px;margin-bottom:4px}.sub{color:#8b949e;font-size:13px;margin-bottom:28px}input{width:100%;background:#0d1117;border:1px solid #30363d;border-radius:8px;color:#e6edf3;padding:12px 16px;font-size:15px;margin-bottom:14px;outline:none}input:focus{border:1px solid #58a6ff}.btn{width:100%;background:#1f6feb;color:white;border:none;border-radius:8px;padding:13px;font-size:15px;cursor:pointer;font-weight:600;margin-bottom:8px}.btn:hover{background:#388bfd}.err{color:#f85149;font-size:13px;margin-top:10px;background:#f8514915;padding:8px 12px;border-radius:6px}.divl{display:flex;align-items:center;gap:10px;margin:18px 0;color:#8b949e;font-size:12px}.divl::before,.divl::after{content:"";flex:1;height:1px;background:#30363d}.bio{width:100%;background:none;border:1px solid #30363d;border-radius:8px;color:#8b949e;padding:11px;font-size:14px;cursor:pointer}.bio:hover{border-color:#58a6ff;color:#e6edf3}</style></head><body><div class="box"><div class="logo">&#129302;</div><h1>BingX Trading Bot</h1><p class="sub">Введите пароль для доступа</p><form method="post"><input type="password" name="password" placeholder="Пароль" autofocus><button class="btn" type="submit">Войти</button></form>{% if error %}<div class="err">{{ error }}</div>{% endif %}<div class="divl">или</div><button class="bio" onclick="bio()">Touch ID / Face ID</button></div><script>async function bio(){if(!window.PublicKeyCredential){alert("Not supported");return;}try{const c=await navigator.credentials.get({publicKey:{challenge:crypto.getRandomValues(new Uint8Array(32)),timeout:60000,userVerification:"required"}});if(c){const r=await fetch("/api/biometric-login",{method:"POST"});const d=await r.json();if(d.ok)location.href="/";}}catch(e){alert("Error: "+e.message);}}</script></body></html>
